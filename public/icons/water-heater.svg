<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#0A3A7E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Tank body -->
  <rect x="18" y="12" width="28" height="44" rx="4" fill="#DDE8F5"/>
  <line x1="18" y1="12" x2="18" y2="56"/>
  <line x1="46" y1="12" x2="46" y2="56"/>
  <!-- Top cap -->
  <ellipse cx="32" cy="12" rx="14" ry="4" fill="#DDE8F5"/>
  <ellipse cx="32" cy="12" rx="14" ry="4"/>
  <!-- Pipes -->
  <line x1="32" y1="8" x2="32" y2="4"/>
  <line x1="28" y1="4" x2="36" y2="4"/>
  <!-- Water level indicator -->
  <line x1="24" y1="20" x2="40" y2="20"/>
  <line x1="24" y1="28" x2="40" y2="28"/>
  <line x1="24" y1="36" x2="40" y2="36"/>
  <line x1="24" y1="44" x2="40" y2="44"/>
  <!-- Control panel -->
  <rect x="26" y="50" width="12" height="6" rx="1"/>
