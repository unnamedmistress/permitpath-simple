<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F7FAFC"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#F7FAFC"/>
  
  <!-- Clipboard -->
  <rect x="120" y="40" width="160" height="200" rx="8" fill="#4A5568"/>
  <rect x="125" y="45" width="150" height="190" rx="4" fill="url(#paperGrad)"/>
  
  <!-- Clipboard clip -->
  <rect x="180" y="25" width="40" height="25" rx="4" fill="#2D3748"/>
  <circle cx="200" cy="37" r="6" fill="#4A5568"/>
  
  <!-- Paper lines -->
  <line x1="145" y1="90" x2="255" y2="90" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="145" y1="110" x2="255" y2="110" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="145" y1="130" x2="230" y2="130" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="145" y1="150" x2="255" y2="150" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="145" y1="170" x2="200" y2="170" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="145" y1="190" x2="240" y2="190" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="145" y1="210" x2="255" y2="210" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Checkbox -->
  <rect x="145" y="85" width="12" height="12" rx="2" stroke="#0A3A7E" stroke-width="2" fill="none"/>
  <path d="M147 91 L151 95 L155 87" stroke="#0A3A7E" stroke-width="2" fill="none"/>
  
  <rect x="145" y="105" width="12" height="12" rx="2" stroke="#E2E8F0" stroke-width="2" fill="none"/>
  <rect x="145" y="145" width="12" height="12" rx="2" stroke="#E2E8F0" stroke-width="2" fill="none"/>
  
  <!-- Pencil -->
  <g transform="translate(300, 120) rotate(45)">
    <rect x="0" y="0" width="16" height="80" fill="#DD6B20"/>
    <polygon points="0,80 8,100 16,80" fill="#F6AD55"/>
    <rect x="0" y="0" width="16" height="10" fill="#2D3748"/>
    <line x1="4" y1="20" x2="4" y2="60" stroke="#F6AD55" stroke-width="2"/>
  </g>
  
  <!-- Floating elements -->
  <circle cx="60" cy="80" r="20" fill="#0A3A7E" opacity="0.1"/>
  <circle cx="340" cy="240" r="30" fill="#0A3A7E" opacity="0.1"/>
  
  <!-- Small checkmark -->
  <circle cx="80" cy="200" r="15" fill="#2F855A" opacity="0.2"/>
  <path d="M74 200 L78 204 L85 195" stroke="#2F855A" stroke-width="2" fill="none"/>
</svg>
